<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{.Title}}</title>
  <script>(function(){var t=localStorage.getItem('hive-theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/dashboard/static/css/main.css" />
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <script>htmx.config.defaultSwapStyle='innerHTML';htmx.config.defaultSettleDelay=80;</script>
</head>
<body hx-boost="true">
  <div class="grain"></div>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/dashboard" class="nav-brand">
        <svg class="nav-logo" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L4 6.5V12C4 16.1 7.4 19.9 12 21C16.6 19.9 20 16.1 20 12V6.5L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M9 12L11 14L15 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="nav-name">hive</span>
      </a>
      <div class="nav-links">
        <a href="/dashboard" class="nav-link {{if eq .Page "dashboard"}}active{{end}}">Instances</a>
        <a href="/dashboard/comms" class="nav-link {{if eq .Page "comms"}}active{{end}}">Communications</a>
      </div>
      <div class="nav-right">
        <span class="mono text-xs text-muted nav-run-count" id="nav-run-count" hx-get="/dashboard/partials/running-count" hx-trigger="every 5s" hx-swap="outerHTML">{{.RunningCount}} running</span>
        <div class="nav-status">
          <span class="status-dot status-dot--green"></span>
          <span class="nav-status-text">online</span>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
          <svg class="icon-sun" width="15" height="15" viewBox="0 0 15 15" fill="none">
            <circle cx="7.5" cy="7.5" r="2.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M7.5 1V2.5M7.5 12.5V14M1 7.5H2.5M12.5 7.5H14M3.04 3.04L4.1 4.1M10.9 10.9L11.96 11.96M3.04 11.96L4.1 10.9M10.9 4.1L11.96 3.04" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <svg class="icon-moon" width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M12 9.5A5.5 5.5 0 0 1 4.5 2a5.5 5.5 0 1 0 7.5 7.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="nav-progress htmx-indicator" id="nav-progress"></div>
  </nav>
  <main class="main" id="main-content">
    {{.Body}}
  </main>
  <script src="/dashboard/static/js/main.js"></script>
</body>
</html>

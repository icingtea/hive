server:
  host: 0.0.0.0
  port: 8181

database:
  path: ./hive.db

kubernetes:
  kubeconfig: ~/.kube/config
  namespace: hive-agents
  in_cluster: false

registry:
  url: hive-registry:5000

hive:
  ws_host: ws://hive-orchestrator.hive-agents.svc.cluster.local:8181
  orchestrator_url: http://hive-orchestrator.hive-agents.svc.cluster.local:8181
  staging_dir: /tmp/hive-staging
